<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIVC | Long-Term Memory Dashboard</title>
    <script src="vendor/cytoscape.min.js"></script>
    <script src="vendor/cytoscape-fcose.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.5);
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --highlight: #d2a8ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #cy {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Top Bar: Search */
        .top-bar {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 500px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .top-bar input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            width: 100%;
            padding: 8px;
            outline: none;
        }

        .top-bar input::placeholder {
            color: var(--text-muted);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Reset Button */
        .reset-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            margin-left: 12px;
        }

        .reset-btn:hover {
            color: var(--highlight);
        }

        /* Relayout Button */
        .relayout-btn {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            padding: 8px 16px;
            transition: all 0.2s;
        }
        .relayout-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Sidebar: Commits */
        .sidebar {
            position: absolute;
            top: 24px;
            right: -400px; /* hidden initially */
            bottom: 24px;
            width: 350px;
            z-index: 10;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .sidebar.open {
            right: 24px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Commit Card */
        .commit-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .commit-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .commit-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            margin: 0 0 8px 0;
        }

        .commit-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .commit-snippet {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
            margin: 0 0 10px 0;
            opacity: 0.9;
        }

        .commit-files {
            font-size: 11px;
            color: #d2a8ff;
            background: rgba(210, 168, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            word-break: break-all;
            margin-top: 4px;
        }

        /* Commit Detail View */
        .commit-detail-back {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            padding: 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .commit-detail-back:hover { color: var(--highlight); }

        .commit-detail-note {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .commit-detail-change {
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 0;
            border-bottom: 1px solid rgba(48,54,61,0.3);
        }
        .commit-detail-change:last-child { border-bottom: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Loader Overlay */
        #init-loader {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-muted);
            font-size: 18px;
            transition: opacity 0.5s;
        }
        #init-loader .big-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="init-loader">
        <div class="big-spinner"></div>
        <div>Loading Graph...</div>
    </div>

    <!-- Search Bar -->
    <div class="top-bar glass">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted); margin-right: 8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Semantic search in memory..." autocomplete="off">
        <div class="spinner" id="searchSpinner"></div>
        <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <!-- Graph Container -->
    <div id="cy"></div>

    <!-- Relayout Button -->
    <button class="relayout-btn" id="relayoutBtn" title="Restart force simulation">⟳ Relayout</button>

    <!-- Results Sidebar -->
    <div class="sidebar glass" id="sidebar">
        <div class="sidebar-header">
            <h2 id="resultsTitle">Results</h2>
        </div>
        <div class="sidebar-content" id="resultsContent">
            <!-- Cards go here -->
        </div>
    </div>

    <script>
        // Simple hash function to generate consistent colors for directories
        function hashColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            // Generate HSL: Hue based on hash, fixed lightness for premium dark mode look
            let hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 70%, 65%)`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
            // 1. Fetch graph data
            let graphData;
            try {
                const res = await fetch('/api/graph');
                graphData = await res.json();
            } catch (err) {
                console.error("Failed to load graph data", err);
                document.getElementById('init-loader').innerHTML = 'Error connecting to AIVC server.';
                return;
            }

            // Prepare elements for Cytoscape
            const elements = [];
            
            // Nodes — smaller sizes to avoid overlap
            const maxCommitCnt = Math.max(...graphData.nodes.map(n => n.commit_count), 1);
            graphData.nodes.forEach(n => {
                elements.push({
                    data: {
                        id: n.id,
                        label: n.label,
                        dir: n.directory,
                        // Base size 10, max +20 logarithmic
                        size: 10 + (Math.log1p(n.commit_count) / Math.log1p(maxCommitCnt)) * 20,
                        color: hashColor(n.directory)
                    }
                });
            });

            // Edges
            const maxWeight = Math.max(...graphData.edges.map(e => e.weight), 1);
            graphData.edges.forEach(e => {
                elements.push({
                    data: {
                        source: e.source,
                        target: e.target,
                        weight: e.weight,
                        opacity: 0.1 + (e.weight / maxWeight) * 0.4
                    }
                });
            });

            // 2. Initialize Cytoscape
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': 'data(color)',
                            'width': 'data(size)',
                            'height': 'data(size)',
                            'label': 'data(label)',
                            'color': '#c9d1d9',
                            'font-size': '11px',
                            'font-family': 'Inter, sans-serif',
                            'text-valign': 'bottom',
                            'text-margin-y': 6,
                            'text-outline-width': 2,
                            'text-outline-color': '#0d1117',
                            'transition-property': 'background-color, line-color, target-arrow-color, width, height, opacity',
                            'transition-duration': '0.3s'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 'mapData(weight, 1, 10, 1, 4)',
                            'line-color': '#444',
                            'opacity': 'data(opacity)',
                            'curve-style': 'bezier',
                            'transition-property': 'opacity',
                            'transition-duration': '0.3s'
                        }
                    },
                    // Highlight UI
                    {
                        selector: 'node.highlight',
                        style: {
                            'border-width': 3,
                            'border-color': '#fff',
                            // Size scales with relevance: base ×1.1 up to ×2.0
                            'width': ele => ele.data('size') * (1.1 + (ele.data('relevance') || 0) * 0.9),
                            'height': ele => ele.data('size') * (1.1 + (ele.data('relevance') || 0) * 0.9),
                            'z-index': 100,
                            'color': '#ffffff',
                            'font-weight': 'bold',
                            'font-size': '13px'
                        }
                    },
                    {
                        selector: 'node.selected',
                        style: {
                            'border-width': 4,
                            'border-color': '#58a6ff',
                            'width': ele => ele.data('size') * 1.8,
                            'height': ele => ele.data('size') * 1.8,
                            'z-index': 200,
                            'color': '#ffffff',
                            'font-weight': 'bold',
                            'font-size': '14px',
                            'shadow-blur': 20,
                            'shadow-color': 'rgba(88, 166, 255, 0.6)',
                            'shadow-opacity': 1,
                            'shadow-offset-x': 0,
                            'shadow-offset-y': 0
                        }
                    },
                    {
                        selector: 'node.neighbor',
                        style: {
                            'border-width': 2,
                            'border-color': '#d2a8ff',
                            // Size scales with relevance (co-occurrence weight): base ×1.0 up to ×1.8
                            'width': ele => ele.data('size') * (1.0 + (ele.data('relevance') || 0) * 0.8),
                            'height': ele => ele.data('size') * (1.0 + (ele.data('relevance') || 0) * 0.8),
                            'z-index': 150,
                            'color': '#e0e0e0',
                            'font-weight': '500',
                            'font-size': '12px'
                        }
                    },
                    {
                        selector: 'edge.neighbor-edge',
                        style: {
                            'line-color': 'rgba(210, 168, 255, 0.6)',
                            'opacity': 0.8,
                            'width': 'mapData(weight, 1, 10, 2, 5)',
                            'z-index': 100
                        }
                    },
                    {
                        selector: 'node.dim',
                        style: {
                            'opacity': 0.12,
                            'color': '#333'
                        }
                    },
                    {
                        selector: 'edge.dim',
                        style: {
                            'opacity': 0.04
                        }
                    }
                ],
                layout: {
                    name: 'cose',
                    animate: true,
                    animationDuration: 800,
                    fit: true,
                    padding: 40,
                    randomize: true,
                    // Force-directed parameters:
                    // Higher repulsion = nodes push apart more
                    nodeRepulsion: function(node) { return 12000; },
                    // Edge length inversely proportional to weight:
                    // High co-occurrence = short edge (attraction)
                    idealEdgeLength: function(edge) {
                        return Math.max(40, 180 / edge.data('weight'));
                    },
                    // Elasticity proportional to weight:
                    // High co-occurrence = strong spring pulling nodes together
                    edgeElasticity: function(edge) {
                        return edge.data('weight') * 80;
                    },
                    gravity: 0.4,
                    numIter: 1000,
                    nestingFactor: 1.2,
                    componentSpacing: 80,
                    nodeOverlap: 20,
                },
                wheelSensitivity: 0.1
            });

            // Remove loader
            setTimeout(() => {
                const loader = document.getElementById('init-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 1000);

            // Reusable layout config
            const layoutConfig = (randomize = false, fit = false) => ({
                name: 'cose',
                animate: true,
                animationDuration: 2500,
                fit: fit,
                padding: 40,
                randomize: randomize,
                nodeRepulsion: function(node) { return 12000; },
                idealEdgeLength: function(edge) {
                    return Math.max(40, 180 / edge.data('weight'));
                },
                edgeElasticity: function(edge) {
                    return edge.data('weight') * 80;
                },
                gravity: 0.4,
                numIter: 1000,
                nestingFactor: 1.2,
                componentSpacing: 80,
                nodeOverlap: 20,
            });

            // Relayout button: re-run with fit to recenter
            document.getElementById('relayoutBtn').addEventListener('click', () => {
                cy.layout(layoutConfig(false, true)).run();
            });

            // Dynamic forces: after dragging a node, re-run without zoom reset
let gitLogOffset = 0;
const gitLogLimit = 15;
let isFetchingLog = false;
let hasMoreLog = true;
let currentSidebarMode = 'log'; // 'log', 'search', 'file'

async function loadGitLog(append = false) {
    if (isFetchingLog || (!hasMoreLog && append)) return;
    isFetchingLog = true;
    
    if (!append) {
        gitLogOffset = 0;
        hasMoreLog = true;
        resultsContent.innerHTML = '<div style="text-align:center; padding: 20px;"><div class="spinner" style="display:inline-block;"></div></div>';
    }

    try {
        const res = await fetch(`/api/log?offset=${gitLogOffset}&limit=${gitLogLimit}`);
        const commits = await res.json();
        
        if (commits.length < gitLogLimit) hasMoreLog = false;
        gitLogOffset += commits.length;

        const html = commits.map(c => `
            <div class="commit-card" data-commit-id='${c.id}'>
                <h3 class="commit-title">${c.title}</h3>
                <div class="commit-meta">
                    <span>${c.timestamp.substring(0,10)}</span>
                    <span style="font-family: monospace;">${c.id.substring(0,8)}</span>
                </div>
                <div class="commit-files">${c.file_count} file(s) modified</div>
            </div>
        `).join('');

        if (append) {
            resultsContent.insertAdjacentHTML('beforeend', html);
        } else {
            resultsTitle.innerText = "Git Log";
            resultsContent.innerHTML = html;
        }

        // Bind clicks
        document.querySelectorAll('.commit-card:not(.bound)').forEach(card => {
            card.classList.add('bound');
            card.addEventListener('click', async () => {
                const commitId = card.getAttribute('data-commit-id');
                await showCommitDetail(commitId);
            });
        });

    } catch (err) {
        if (!append) resultsContent.innerHTML = `<p style="color: #ff7b72;">Error: ${err.message}</p>`;
    } finally {
        isFetchingLog = false;
    }
}

async function showFileHistory(nodeId) {
    currentSidebarMode = 'file';
    resultsTitle.innerText = 'File History';
    resultsContent.innerHTML = '<div style="text-align:center; padding: 20px;"><div class="spinner" style="display:inline-block;"></div></div>';
    sidebar.classList.add('open');

    try {
        const res = await fetch(`/api/file-history/${encodeURIComponent(nodeId)}`);
        const history = await res.json();

        if (history.error) {
            resultsContent.innerHTML = `<p style="color: #ff7b72;">${history.error}</p>`;
            return;
        }

        const filename = nodeId.split('/').pop();
        resultsTitle.innerHTML = `<div style="font-size: 14px; word-break: break-all; color: var(--highlight);">${filename}</div>`;
        
        resultsContent.innerHTML = `
            <button class="commit-detail-back" id="backToLog">← Back to Git Log</button>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">${history.length} commit(s)</div>
            ${history.map(c => `
                <div class="commit-card" data-commit-id='${c.commit_id}'>
                    <h3 class="commit-title">${c.title}</h3>
                    <div class="commit-meta">
                        <span>${c.timestamp.substring(0,10)}</span>
                        <span style="font-family: monospace;">${c.commit_id.substring(0,8)}</span>
                    </div>
                </div>
            `).join('')}
        `;

        document.getElementById('backToLog').addEventListener('click', () => {
            currentSidebarMode = 'log';
            loadGitLog(false);
        });

        document.querySelectorAll('.commit-card').forEach(card => {
            card.addEventListener('click', async () => {
                const commitId = card.getAttribute('data-commit-id');
                await showCommitDetail(commitId);
            });
        });

    } catch (err) {
        resultsContent.innerHTML = `<p style="color: #ff7b72;">Error: ${err.message}</p>`;
    }
}
            cy.on('free', 'node', function(e) { // Deleted
                // cy.layout(layoutConfig(false, false)).run();
            });

            // 3. Search Logic
            const searchInput = document.getElementById('searchInput');
            const searchSpinner = document.getElementById('searchSpinner');
            const resetBtn = document.getElementById('resetBtn');
            const sidebar = document.getElementById('sidebar');
            const resultsContent = document.getElementById('resultsContent');
            const resultsTitle = document.getElementById('resultsTitle');

            // Handle Node Hover
            cy.on('mouseover', 'node', function(e){
                document.body.style.cursor = 'pointer';
            });
            cy.on('mouseout', 'node', function(e){
                document.body.style.cursor = 'default';
            });

            // Click node: highlight it + distance-1 neighbors, dim rest
            // Neighbor size is proportional to co-occurrence weight (edge weight)
            cy.on('tap', 'node', function(e){
                let node = e.target;
                let neighborhood = node.neighborhood();
                let neighborNodes = neighborhood.nodes();
                let neighborEdges = neighborhood.edges();

                // Compute max edge weight for normalization
                let maxWeight = 1;
                neighborEdges.forEach(edge => {
                    if (edge.data('weight') > maxWeight) maxWeight = edge.data('weight');
                });

                cy.batch(() => {
                    // Clear all previous selection classes
                    cy.elements().removeClass('selected neighbor neighbor-edge highlight dim');

                    // Dim everything first
                    cy.nodes().addClass('dim');
                    cy.edges().addClass('dim');

                    // Highlight the selected node
                    node.removeClass('dim');
                    node.addClass('selected');

                    // Highlight neighbors with relevance proportional to edge weight
                    neighborNodes.forEach(neighborNode => {
                        // Find connecting edge to get weight
                        let connectingEdge = neighborEdges.filter(e =>
                            e.source().id() === neighborNode.id() || e.target().id() === neighborNode.id()
                        );
                        let weight = connectingEdge.length > 0 ? connectingEdge[0].data('weight') : 1;
                        let relevance = weight / maxWeight; // normalized 0-1
                        neighborNode.data('relevance', relevance);
                        neighborNode.removeClass('dim');
                        neighborNode.addClass('neighbor');
                    });

                    // Highlight edges connecting to neighbors
                    neighborEdges.removeClass('dim');
                    neighborEdges.addClass('neighbor-edge');
                });

                // Animate to center on the subgraph
                let focusElems = node.union(neighborNodes);
                cy.animate({
                    fit: { eles: focusElems, padding: 80 }
                }, { duration: 500 });

                showFileHistory(node.id());
            });

            // Click background: clear selection
            cy.on('tap', function(e){
                if (e.target === cy) {
                    cy.batch(() => {
                        cy.elements().removeClass('selected neighbor neighbor-edge dim');
                        cy.nodes().removeData('relevance');
                        // Re-apply search highlight if active
                        if (involvedFilesGlobal.size > 0) {
                            cy.nodes().forEach(n => {
                                if (involvedFilesGlobal.has(n.id())) {
                                    n.data('relevance', fileRelevanceGlobal[n.id()] || 0);
                                    n.addClass('highlight');
                                } else {
                                    n.addClass('dim');
                                }
                            });
                            cy.edges().addClass('dim');
                        }
                    });
                }
            });

            // Infinite scroll for Git Log
            resultsContent.addEventListener('scroll', () => {
                if (currentSidebarMode !== 'log') return;
                
                // If scrolled near bottom
                if (resultsContent.scrollTop + resultsContent.clientHeight >= resultsContent.scrollHeight - 50) {
                    loadGitLog(true); // append
                }
            });

            let involvedFilesGlobal = new Set();
            let fileRelevanceGlobal = {};  // file_path -> normalized relevance [0,1]
            let lastSearchResults = [];  // Store for commit detail navigation

            searchInput.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (!query) {
                        resetSearch();
                        return;
                    }
                    doSearch(query);
                }
            });

            resetBtn.addEventListener('click', () => {
                searchInput.value = '';
                resetSearch();
            });

            async function doSearch(query) {
                searchSpinner.style.display = 'block';
                resetBtn.style.display = 'none';
                currentSidebarMode = 'search';
                
                try {
                    const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                    const commits = await res.json();
                    
                    searchSpinner.style.display = 'none';
                    resetBtn.style.display = 'block';

                    if (commits.length === 0) {
                        resultsTitle.innerText = "No results";
                        resultsContent.innerHTML = "<p style='color: var(--text-muted);'>Try another query or different keywords.</p>";
                        sidebar.classList.add('open');
                        resetSearch(false);
                        return;
                    }

                    // Compute per-file relevance from scores
                    involvedFilesGlobal.clear();
                    fileRelevanceGlobal = {};

                    // Normalize scores to [0, 1]
                    const scores = commits.map(c => c.score);
                    const minScore = Math.min(...scores);
                    const maxScore = Math.max(...scores);
                    const scoreRange = (maxScore - minScore) || 1;

                    commits.forEach(c => {
                        const normalizedScore = (c.score - minScore) / scoreRange; // 0 to 1
                        c.file_paths.forEach(f => {
                            involvedFilesGlobal.add(f);
                            if (!fileRelevanceGlobal[f]) fileRelevanceGlobal[f] = 0;
                            fileRelevanceGlobal[f] += normalizedScore;
                        });
                    });

                    // Normalize per-file relevance to [0, 1]
                    const maxFileRel = Math.max(...Object.values(fileRelevanceGlobal), 0.001);
                    for (const f in fileRelevanceGlobal) {
                        fileRelevanceGlobal[f] /= maxFileRel;
                    }

                    // Update Graph Style with proportional sizing
                    cy.batch(() => {
                        cy.elements().removeClass('highlight dim selected neighbor neighbor-edge');
                        
                        cy.nodes().forEach(node => {
                            const rel = fileRelevanceGlobal[node.id()];
                            if (rel !== undefined) {
                                node.data('relevance', rel);
                                node.addClass('highlight');
                            } else {
                                node.addClass('dim');
                            }
                        });

                        cy.edges().addClass('dim');
                    });

                    // Fit view to highlighted nodes
                    if(involvedFilesGlobal.size > 0) {
                        const highlightedElems = cy.nodes('.highlight');
                        cy.animate({
                            fit: {
                                eles: highlightedElems,
                                padding: 50
                            }
                        }, { duration: 700 });
                    }

                    // Update Sidebar using centralized renderer
                    renderSearchResults(commits);
                    sidebar.classList.add('open');

                } catch (err) {
                    console.error("Search failed", err);
                    searchSpinner.style.display = 'none';
                    resetBtn.style.display = 'block';
                    alert("Error during semantic search.");
                }
            }

            function resetSearch(closeSidebar = false) {
                involvedFilesGlobal.clear();
                fileRelevanceGlobal = {};
                cy.batch(() => {
                    cy.elements().removeClass('highlight dim selected neighbor neighbor-edge');
                    cy.nodes().removeData('relevance');
                });
                cy.animate({ fit: { padding: 30 } }, { duration: 500 });
                resetBtn.style.display = 'none';
                
                if (closeSidebar) {
                    sidebar.classList.remove('open');
                } else {
                    currentSidebarMode = 'log';
                    loadGitLog(false);
                }
            }

            // Commit Detail View
            async function showCommitDetail(commitId) {
                resultsTitle.innerText = 'Loading...';
                resultsContent.innerHTML = '';
                 sidebar.classList.add('open');

                try {
                    const res = await fetch(`/api/commit/${commitId}`);
                    const commit = await res.json();

                    if (commit.error) {
                        resultsTitle.innerText = 'Error';
                        resultsContent.innerHTML = `<p style="color: #ff7b72;">${commit.error}</p>`;
                        return;
                    }

                    resultsTitle.innerText = commit.title;
                    resultsContent.innerHTML = `
                        <button class="commit-detail-back" id="backToResults">← Back</button>
                        <div class="commit-meta">
                            <span>${commit.timestamp.substring(0, 10)}</span>
                            <span style="font-family: monospace; font-size: 11px;">${commit.id.substring(0, 8)}</span>
                        </div>
                        <div class="commit-detail-note">${commit.note}</div>
                        <h3 style="font-size: 14px; margin: 16px 0 8px; color: var(--highlight);">Modified files (${commit.changes.length})</h3>
                        ${commit.changes.map(c => `
                            <div class="commit-detail-change">
                                <span style="color: ${c.action === 'added' ? '#7ee787' : c.action === 'deleted' ? '#ff7b72' : '#d2a8ff'};">[${c.action}]</span>
                                ${c.path.split('/').pop()}
                                <span style="color: var(--text-muted); margin-left: 8px;">${formatSize(c.size_after - c.size_before)}</span>
                            </div>
                        `).join('')}
                    `;

                    document.getElementById('backToResults').addEventListener('click', () => {
                        if (currentSidebarMode === 'search' && lastSearchResults.length > 0) {
                            renderSearchResults(lastSearchResults);
                        } else if (currentSidebarMode === 'file') {
                            // Can't easily go back to previous file list without its ID, so fallback to log
                            currentSidebarMode = 'log';
                            loadGitLog(false);
                        } else {
                            currentSidebarMode = 'log';
                            loadGitLog(false);
                        }
                    });

                } catch (err) {
                    resultsTitle.innerText = 'Error';
                    resultsContent.innerHTML = `<p style="color: #ff7b72;">${err.message}</p>`;
                }
            }

            function formatSize(bytes) {
                if (bytes === 0) return '±0';
                const sign = bytes > 0 ? '+' : '';
                if (Math.abs(bytes) < 1024) return `${sign}${bytes} B`;
                return `${sign}${(bytes / 1024).toFixed(1)} KB`;
            }

            function renderSearchResults(commits) {
                lastSearchResults = commits;
                resultsTitle.innerText = `${commits.length} Commit${commits.length > 1 ? 's' : ''}`;
                resultsContent.innerHTML = commits.map(c => `
                    <div class="commit-card" data-files='${JSON.stringify(c.file_paths)}' data-commit-id='${c.commit_id}'>
                        <h3 class="commit-title">${c.title}</h3>
                        <div class="commit-meta">
                            <span>${c.timestamp.substring(0,10)}</span>
                            <span>Score: ${c.score.toFixed(3)}</span>
                        </div>
                        <p class="commit-snippet">${c.snippet}...</p>
                        ${c.file_paths.length ? `<div class="commit-files">${c.file_paths.length} file(s) associated</div>` : ''}
                    </div>
                `).join('');

                // Re-bind click handlers
                document.querySelectorAll('.commit-card').forEach(card => {
                    card.addEventListener('click', async () => {
                        const commitId = card.getAttribute('data-commit-id');
                        await showCommitDetail(commitId);
                    });
                });

                // Re-bind hover handlers
                document.querySelectorAll('.commit-card').forEach(card => {
                    card.addEventListener('mouseenter', () => {
                        const files = JSON.parse(card.getAttribute('data-files'));
                        cy.batch(() => {
                            cy.nodes().removeClass('highlight');
                            cy.nodes().forEach(n => {
                                if(files.includes(n.id())) n.addClass('highlight');
                            });
                        });
                    });
                    card.addEventListener('mouseleave', () => {
                        cy.batch(() => {
                            cy.nodes().removeClass('highlight');
                            cy.nodes().forEach(n => {
                                if(involvedFilesGlobal.has(n.id())) n.addClass('highlight');
                            });
                        });
                    });
                });
            }
            
            // Initialization on startup
            sidebar.classList.add("open");
            loadGitLog(false);
            
            } catch (globalError) {
                console.error("Global JS Error: ", globalError);
                document.getElementById('init-loader').innerHTML = '<div style="color:#ff7b72; font-weight:bold;">JS Error : ' + globalError.message + '</div>';
            }
        });
    </script>
</body>
</html>
